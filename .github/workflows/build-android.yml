name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Build web application
        run: npm run build

      - name: Sync Capacitor Android
        run: |
          if [ -d "android" ]; then
            npx cap sync android
          else
            npx cap add android
            npx cap sync android
          fi

      - name: Fix Gradle configs for consistency
        run: |
          # Fix capacitor-cordova-android-plugins build.gradle
          if [ -f "android/capacitor-cordova-android-plugins/build.gradle" ]; then
            sed -i 's/classpath \'com.android.tools.build:gradle:8.13.0\'/classpath \'com.android.tools.build:gradle:8.7.3\'/' android/capacitor-cordova-android-plugins/build.gradle
            sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/' android/capacitor-cordova-android-plugins/build.gradle
          fi
          # Fix capacitor.build.gradle
          if [ -f "android/app/capacitor.build.gradle" ]; then
            sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/' android/app/capacitor.build.gradle
          fi
          # Set local.properties
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > android/local.properties

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace --warning-mode all

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pawsync-pro-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn