// 配置插件管理镜像源（镜像前置 → 官方兜底）
// 验证结果（2026-06-11）：
//   腾讯云 maven-public  ✅ 200  包含 plugins.gradle.org（com.android.application plugin marker 测试通过）
//   腾讯云 gradle-plugins ✅ 200  maven-public 子集（保留作 plugin 备份）
//   阿里云 public          ✅ 200  仅中央仓库
//   阿里云 google          ✅ 200  仅 Google 仓库
//   阿里云 gradle-plugin   ❌ 404  路径不存在，已移除

pluginManagement {
    repositories {
        // 腾讯云镜像（优先，最全：含 Central + Google + plugins.gradle.org）
        maven { url 'https://mirrors.cloud.tencent.com/nexus/repository/maven-public/' }
        maven { url 'https://mirrors.cloud.tencent.com/nexus/repository/gradle-plugins/' }
        // 阿里云镜像
        maven { url 'https://maven.aliyun.com/repository/public' }
        maven { url 'https://maven.aliyun.com/repository/google' }
        // 华为云镜像
        maven { url 'https://repo.huaweicloud.com/repository/maven/' }
        // 官方源（兜底）
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

// 依赖解析管理
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        // 腾讯云镜像（优先）
        maven { url 'https://mirrors.cloud.tencent.com/nexus/repository/maven-public/' }
        // 阿里云镜像
        maven { url 'https://maven.aliyun.com/repository/public' }
        maven { url 'https://maven.aliyun.com/repository/google' }
        // 华为云镜像
        maven { url 'https://repo.huaweicloud.com/repository/maven/' }
        // 官方源（兜底）
        google()
        mavenCentral()
    }
}

include ':app'
include ':capacitor-cordova-android-plugins'
project(':capacitor-cordova-android-plugins').projectDir = new File('./capacitor-cordova-android-plugins/')

apply from: 'capacitor.settings.gradle'
