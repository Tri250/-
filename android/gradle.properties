org.gradle.jvmargs=-Xmx4096m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true
org.gradle.daemon=true
android.useAndroidX=true
android.enableJetifier=false
android.nonTransitiveRClass=true
android.suppressUnsupportedCompileSdk=35
android.aapt2FromMavenOverride=
android.defaults.buildfeatures.buildconfig=true
systemProp.org.gradle.internal.launcher.welcomeMessageEnabled=false

# 网络超时配置 - 增加到 5 分钟
systemProp.http.connectionTimeout=600000
systemProp.http.socketTimeout=600000
systemProp.https.connectionTimeout=600000
systemProp.https.socketTimeout=600000
org.gradle.internal.http.connectionTimeout=600000
org.gradle.internal.http.socketTimeout=600000

# 重试配置
systemProp.org.gradle.internal.repository.max_retries=5
systemProp.org.gradle.internal.repository.retry_interval=5000

# 启用并行下载
org.gradle.internal.launcher.parallel=true